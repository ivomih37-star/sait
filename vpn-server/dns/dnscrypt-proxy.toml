# Конфиг dnscrypt-proxy для VPN-клиентов.
# Контейнер работает в сетевом namespace wg-easy (network_mode: service:wg-easy),
# поэтому слушает на всех интерфейсах этого namespace, включая wg0 (адрес сервера внутри туннеля).

listen_addresses = ['0.0.0.0:53']
server_names = ['cloudflare', 'quad9-doh']

# Только зашифрованные протоколы (DNS-over-HTTPS / DNSCrypt) — защита от перехвата и подмены DNS провайдером
ipv4_servers = true
ipv6_servers = false
dnscrypt_servers = true
doh_servers = true
odoh_servers = false

require_dnssec = true
require_nolog = true
require_nofilter = true

# Не резолвим напрямую по plain DNS ни при каких обстоятельствах (анти-утечка)
force_tcp = false
timeout = 5000

cache = true
cache_size = 4096
cache_min_ttl = 2400
cache_max_ttl = 86400

# Не пишем query-логи на диск (privacy — требование "отключить логирование трафика")
[query_log]
file = ''

[nx_log]
file = ''

[sources.'public-resolvers']
urls = ['https://raw.githubusercontent.com/DNSCrypt/dnscrypt-resolvers/master/v3/public-resolvers.md']
cache_file = 'public-resolvers.md'
minisign_key = 'RWQf6LRCGA9i53mlYecO4IzT51TGPpvWucNSCh1CBM0QTaLn73Y7GFO3'
refresh_delay = 72
prefix = ''
