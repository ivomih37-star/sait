# Leak-proof encrypted DNS for VPN clients.
#
# All queries from WireGuard clients hit Unbound (10.8.0.53), which forwards
# them upstream over an ENCRYPTED channel (DNS-over-TLS to Cloudflare + Quad9).
# Clients never talk to a plaintext resolver, so DNS cannot leak to the ISP.
#
# For DNS-over-HTTPS specifically, see README ("Switching Unbound to DoH via
# dnscrypt-proxy"); DoT here provides equivalent privacy with less overhead.
forward-zone:
    name: "."
    forward-tls-upstream: yes
    # Cloudflare
    forward-addr: 1.1.1.1@853#cloudflare-dns.com
    forward-addr: 1.0.0.1@853#cloudflare-dns.com
    # Quad9 (malware-blocking) as secondary
    forward-addr: 9.9.9.9@853#dns.quad9.net
    forward-addr: 149.112.112.112@853#dns.quad9.net
