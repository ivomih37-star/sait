# WireGuard VPN stack:
#   * wg-easy  — WireGuard server + web panel + QR codes (bound to localhost)
#   * unbound  — local DNS resolver with DNS-over-HTTPS upstream (no leaks)
#   * xray     — optional VLESS/TLS fallback for hostile networks (--profile xray)
#
# All secrets come from ./.env (generated by setup.sh). Never commit .env.
services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:14
    container_name: wg-easy
    restart: unless-stopped
    env_file: .env
    environment:
      # Public endpoint clients connect to.
      - WG_HOST=${WG_HOST}
      - WG_PORT=${WG_PORT}
      # Web UI auth. PASSWORD_HASH (bcrypt) preferred; PASSWORD is the fallback.
      - PASSWORD_HASH=${PASSWORD_HASH}
      - PASSWORD=${WEB_PASSWORD}
      - PORT=${WEB_PORT}
      # Clients resolve DNS through our leak-proof local resolver (Unbound).
      - WG_DEFAULT_DNS=10.42.0.53
      # Split tunnel: regenerated by scripts/update-routes.sh.
      - WG_ALLOWED_IPS=${WG_ALLOWED_IPS}
      # Privacy: keep persistent keepalive so mobiles reconnect fast.
      - WG_PERSISTENT_KEEPALIVE=25
      - WG_MTU=1420
      - UI_TRAFFIC_STATS=true
      - LANG=en
    volumes:
      - ./data/wg-easy:/etc/wireguard
    # IMPORTANT: web port is published ONLY on loopback. Reach it via SSH tunnel.
    ports:
      - "127.0.0.1:${WEB_PORT}:${WEB_PORT}/tcp"
      - "${WG_PORT}:${WG_PORT}/udp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    depends_on:
      - unbound
    networks:
      vpn:
        ipv4_address: 10.42.0.2

  # Leak-proof DNS: Unbound forwards to Cloudflare/Quad9 over DNS-over-TLS.
  unbound:
    image: mvance/unbound:latest
    container_name: unbound
    restart: unless-stopped
    volumes:
      # mvance/unbound includes this file automatically for custom forwarders.
      - ./unbound/forward-records.conf:/opt/unbound/etc/unbound/forward-records.conf:ro
    networks:
      vpn:
        ipv4_address: 10.42.0.53

  # Optional obfuscated fallback (VLESS + TLS on 443) for DPI-heavy networks.
  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: xray
    restart: unless-stopped
    profiles: [ "xray" ]
    command: [ "run", "-c", "/etc/xray/config.json" ]
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
      - ./data/xray:/var/log/xray
    ports:
      - "${XRAY_PORT}:${XRAY_PORT}/tcp"
    networks:
      - vpn

networks:
  vpn:
    driver: bridge
    ipam:
      config:
        # Separate from the WireGuard client subnet (10.8.0.0/24) to avoid a
        # routing collision — wg-easy hands clients 10.8.0.x on the tunnel.
        - subnet: 10.42.0.0/24
