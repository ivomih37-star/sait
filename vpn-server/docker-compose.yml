name: vpn-server

services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:14
    container_name: wg-easy
    restart: unless-stopped
    environment:
      - WG_HOST=${WG_HOST}
      - PASSWORD_HASH=${PASSWORD_HASH}
      - PORT=${WEB_PORT:-51821}
      - WG_PORT=${WG_PORT:-51820}
      - WG_DEFAULT_ADDRESS=${WG_DEFAULT_ADDRESS:-10.8.0.x}
      - WG_DEFAULT_DNS=${WG_DEFAULT_DNS:-10.8.0.1}
      - WG_ALLOWED_IPS=${WG_ALLOWED_IPS:-0.0.0.0/0}
      - WG_PERSISTENT_KEEPALIVE=25
      - UI_TRAFFIC_STATS=${UI_TRAFFIC_STATS:-false}
      - TZ=${TZ:-UTC}
    volumes:
      - wg_data:/etc/wireguard
    ports:
      # Веб-панель: только localhost — доступ исключительно через SSH-туннель (см. README, раздел "Безопасность")
      - "127.0.0.1:${WEB_PORT:-51821}:${WEB_PORT:-51821}/tcp"
      # WireGuard туннель: открыт наружу (UFW разрешает этот порт)
      - "${WG_PORT:-51820}:${WG_PORT:-51820}/udp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:${WEB_PORT:-51821}/"]
      interval: 30s
      timeout: 5s
      retries: 5

  # DNS-over-HTTPS резолвер для клиентов VPN (защита от утечек DNS и слежки провайдера).
  # Работает в сетевом namespace wg-easy, поэтому слышен клиентам по адресу сервера внутри туннеля (WG_DEFAULT_DNS).
  dnscrypt-proxy:
    image: klutchell/dnscrypt-proxy:latest
    container_name: dnscrypt-proxy
    restart: unless-stopped
    network_mode: "service:wg-easy"
    depends_on:
      wg-easy:
        condition: service_started
    volumes:
      - ./dns/dnscrypt-proxy.toml:/config/dnscrypt-proxy.toml:ro
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # Xray (VLESS + Reality) — фолбэк-протокол на случай блокировки WireGuard/UDP по DPI.
  # Слушает напрямую на публичном порту (обычно 443/tcp), маскируется под TLS-хендшейк к реальному сайту (XRAY_SNI).
  xray:
    image: teddysun/xray:latest
    container_name: xray
    restart: unless-stopped
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
    ports:
      - "${XRAY_PORT:-443}:${XRAY_PORT:-443}/tcp"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  wg_data:
