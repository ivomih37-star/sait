# =====================================================================
#  EXAMPLE / TEMPLATE — client1-phone.conf
#  Real per-device configs are generated by:  scripts/add-client.sh phone
#  (which fills in the real keys, server IP and split-tunnel AllowedIPs and
#   prints a QR code). This file only shows the expected structure.
# =====================================================================
[Interface]
# Private key of THIS device (unique per client — never share/reuse).
PrivateKey = <CLIENT_PRIVATE_KEY>
# Address handed out by the server (10.8.0.x/24).
Address = 10.8.0.2/24
# Leak-proof DNS: the server Unbound resolver 10.42.0.53 (DoT upstream).
DNS = 10.42.0.53

[Peer]
# Server public key (from wg-easy).
PublicKey = <SERVER_PUBLIC_KEY>
# SPLIT TUNNEL: everything EXCEPT Russian ranges & banks goes via the VPN.
# The real value is the long comma-separated list from
# configs/allowed-ips-split.txt. For a full tunnel use: 0.0.0.0/0
AllowedIPs = <SPLIT_ALLOWED_IPS_OR_0.0.0.0/0>
# Public server endpoint.
Endpoint = <SERVER_PUBLIC_IP>:51820
# Keep NAT mappings alive on mobile networks.
PersistentKeepalive = 25
