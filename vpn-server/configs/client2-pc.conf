# =====================================================================
#  EXAMPLE / TEMPLATE — client2-pc.conf  (Windows / macOS / Linux)
#  Generate the real one with:  scripts/add-client.sh laptop
#  Then import this file in the WireGuard desktop app ("Import from file").
# =====================================================================
[Interface]
PrivateKey = <CLIENT_PRIVATE_KEY>
Address = 10.8.0.3/24
DNS = 10.42.0.53

[Peer]
PublicKey = <SERVER_PUBLIC_KEY>
# Full tunnel by default on desktops (0.0.0.0/0). Swap in the split list from
# configs/allowed-ips-split.txt if you want RU/banks to bypass the VPN.
AllowedIPs = 0.0.0.0/0
Endpoint = <SERVER_PUBLIC_IP>:51820
PersistentKeepalive = 25
