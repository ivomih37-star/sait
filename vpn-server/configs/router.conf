# =====================================================================
#  EXAMPLE / TEMPLATE — router.conf  (Keenetic / OpenWrt whole-home VPN)
#  Generate the real one with:  scripts/add-client.sh router
#  Import on the router as a WireGuard "peer"/"interface". See
#  router-configs/keenetic-guide.md and router-configs/openwrt-guide.md.
# =====================================================================
[Interface]
PrivateKey = <CLIENT_PRIVATE_KEY>
Address = 10.8.0.4/24
# Use the server resolver; on OpenWrt you may instead point dnsmasq at it.
DNS = 10.42.0.53

[Peer]
PublicKey = <SERVER_PUBLIC_KEY>
# For a router doing DOMAIN-based split tunneling (recommended), keep the FULL
# range here (0.0.0.0/0) and let the router's dnsmasq+ipset rules decide which
# domains are policy-routed through wg0. See openwrt-guide.md.
# For IP-based split directly on the tunnel, paste configs/allowed-ips-split.txt.
AllowedIPs = 0.0.0.0/0
Endpoint = <SERVER_PUBLIC_IP>:51820
PersistentKeepalive = 25
