name: Деплой сайта на Beget

# Собирает статический сайт и заливает его по FTP в public_html на Beget.
# Запускается при пуше в main (когда меняется сайт) и вручную.

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "next.config.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/beget-deploy.yml"
  workflow_dispatch:

concurrency:
  group: beget-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install & build
        run: |
          npm ci
          npm run build
          # страховка от Jekyll и пустого каталога
          touch out/.nojekyll

      - name: Deploy to Beget via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./out/
          # каталог сайта на Beget (напр. ракияклуб.рф/public_html/).
          # Задаётся переменной репозитория FTP_SERVER_DIR (Settings → Variables).
          server-dir: ${{ vars.FTP_SERVER_DIR }}
