# ===========================================================================
#  Nginx reverse proxy для РакияКлуб.рф (Beget Ubuntu VPS)
#  Домен в punycode: xn--80aaldqfdq.xn--p1ai
#  SSL выпускается через certbot (см. DEPLOY.md).
# ===========================================================================

# HTTP → HTTPS редирект + ACME-challenge для Let's Encrypt
server {
    listen 80;
    server_name xn--80aaldqfdq.xn--p1ai www.xn--80aaldqfdq.xn--p1ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name xn--80aaldqfdq.xn--p1ai www.xn--80aaldqfdq.xn--p1ai;

    # Сертификаты Let's Encrypt (заполняются certbot)
    ssl_certificate     /etc/letsencrypt/live/xn--80aaldqfdq.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--80aaldqfdq.xn--p1ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Безопасные заголовки
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    client_max_body_size 10M;

    # Статика Next отдаётся с долгим кэшем
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }
}
